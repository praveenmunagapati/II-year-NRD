<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Tracking Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="row">
        <div class="col-md-5 mx-auto">
            <div class="card p-4 shadow-sm bg-white">
                <h3 class="text-center mb-4 text-primary">User Session Portal</h3>

                <form action="SessionServlet" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Select UI Theme Preference</label>
                        <select name="theme" class="form-select">
                            <option value="light">Light Theme (Gray Background)</option>
                            <option value="dark">Dark Theme (Dark Blue Background)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Initialize Session</button>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
