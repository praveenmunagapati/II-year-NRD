<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="catalog.html" class="brand">E-Shop</a>
            <ul class="nav-links">
                <li><a href="catalog.html">Catalog</a></li>
                <li><a href="cart.html" class="active">Cart</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 25px; color: #2c3e50;">Shopping Cart</h2>
        
        <div class="cart-layout">
            <!-- Left Side: Cart Items -->
            <div class="cart-items">
                <!-- Cart Item 1 -->
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-img"></div>
                        <div class="cart-item-details">
                            <h4>Wireless Headphones</h4>
                            <p>Unit Price: $99.99</p>
                        </div>
                    </div>
                    <div class="cart-item-actions">
                        <input type="number" class="quantity-input" value="1" min="1">
                        <button class="remove-btn">Remove</button>
                    </div>
                </div>

                <!-- Cart Item 2 -->
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-img"></div>
                        <div class="cart-item-details">
                            <h4>Mechanical Keyboard</h4>
                            <p>Unit Price: $89.99</p>
                        </div>
                    </div>
                    <div class="cart-item-actions">
                        <input type="number" class="quantity-input" value="1" min="1">
                        <button class="remove-btn">Remove</button>
                    </div>
                </div>
            </div>

            <!-- Right Side: Order Summary -->
            <div class="cart-summary">
                <h3 style="margin-bottom: 20px; color: #2c3e50;">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>$189.98</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span>$189.98</span>
                </div>
                <button class="btn" style="margin-top: 15px;">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2025 E-Shop Application. All rights reserved.
    </footer>
</body>
</html>
