<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card p-4 shadow-sm bg-white">
                <h3 class="text-center mb-4 text-primary">Student Registration</h3>

                <!-- Form actions point directly to the Jakarta Servlet Controller URL mapping -->
                <form action="RegisterServlet" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="studentName" class="form-control" placeholder="Enter Full Name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="studentEmail" class="form-control" placeholder="Enter Email Address" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" name="studentAge" class="form-control" placeholder="Enter Age" required min="10" max="100">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register Student</button>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
